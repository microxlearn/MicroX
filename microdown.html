<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="refresh" content="0; url=https://new.microxlearn.online">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCA Semester Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#eef4ff,#ffffff,#dce9ff);
display:flex;
justify-content:center;
align-items:center;
padding:16px;
}

.container{
width:100%;
max-width:520px;
}

.header{
background:linear-gradient(135deg,#0d6efd,#42a5ff);
color:#fff;
text-align:center;
padding:26px 18px;
border-radius:24px;
box-shadow:0 14px 30px rgba(13,110,253,.22);
margin-bottom:18px;
}

.header h1{
font-size:30px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:.95;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

.sem-btn{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
background:#ffffff;
color:#0d47a1;
font-size:18px;
font-weight:700;
padding:18px;
border-radius:20px;
border:1px solid #e6efff;
box-shadow:0 8px 22px rgba(0,0,0,.08);
transition:.25s;
cursor:pointer;
}

.sem-btn:hover{
transform:translateY(-4px);
background:#f5f9ff;
box-shadow:0 14px 24px rgba(0,0,0,.12);
}

.footer{
text-align:center;
font-size:13px;
color:#666;
margin-top:16px;
}

@media(min-width:600px){
.grid{
grid-template-columns:1fr 1fr;
}
}

@media(max-width:480px){
.header h1{
font-size:25px;
}
.sem-btn{
font-size:16px;
padding:16px;
border-radius:18px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>BCA Semester Portal</h1>
<p>Select Your Semester</p>
</div>

<div class="grid">

<a href="sem1.html" class="sem-btn">BCA 1st Sem</a>

<a href="sem2.html" class="sem-btn">BCA 2nd Sem</a>

<a href="sem3.html" class="sem-btn">BCA 3rd Sem</a>

<a href="sem4.html" class="sem-btn">BCA 4th Sem</a>

</div>

<div class="footer">
Fast Access • Responsive Design
</div>

</div>

</body>
</html>
